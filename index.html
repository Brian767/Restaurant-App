<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant App</title>
    <link rel="stylesheet" href="index.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Smythe&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="container">
      <header>
        <div id="header-content">
          <h1 id="header-title">Jimmy's Diner</h1>
          <h3 id="header-subtitle">The best burgers and pizzas in town.</h3>
        </div>
      </header>
      <main>
        <section id="menu"></section>
        <section id="cart">
          <h2 id="your-order">Your Order</h2>
          <div id="cart-html">
          </div>

          <hr class="line-break" />
          <div class="container-flex">
            <p class="total-price-text">Total Price:</p>
            <p id="total-price" class="menu-item-price"></p>
          </div>

          <button id="complete-order-btn">Complete Order</button>
        </section>
      </main>
    </div>

    <script src="index.js" type="module"></script>
  </body>
</html>
